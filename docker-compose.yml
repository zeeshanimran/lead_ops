services:
  postgres:
    image: postgres:16-alpine
    container_name: leadops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: leadops
      POSTGRES_PASSWORD: leadops
      POSTGRES_DB: leadops_crm
    ports:
      - "5433:5432"
    volumes:
      - leadops-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: leadops-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - leadops-redis:/data

volumes:
  leadops-postgres:
  leadops-redis:
