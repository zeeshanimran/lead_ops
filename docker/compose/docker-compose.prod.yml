services:
  postgres:
    image: postgres:16-alpine
    container_name: leadops-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    volumes:
      - leadops-postgres-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: leadops-redis-prod
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:?REDIS_PORT is required}:6379"
    volumes:
      - leadops-redis-prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ${DOCKERHUB_NAMESPACE:?DOCKERHUB_NAMESPACE is required}/leadops-api:${API_IMAGE_TAG:?API_IMAGE_TAG is required}
    container_name: leadops-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_HOST: postgres
      POSTGRES_INTERNAL_PORT: 5432
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRES_IN_SECONDS: ${JWT_ACCESS_EXPIRES_IN_SECONDS:?JWT_ACCESS_EXPIRES_IN_SECONDS is required}
      JWT_REFRESH_EXPIRES_IN_SECONDS: ${JWT_REFRESH_EXPIRES_IN_SECONDS:?JWT_REFRESH_EXPIRES_IN_SECONDS is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      APP_URL: ${APP_URL:?APP_URL is required}
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:?SUPER_ADMIN_NAME is required}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:?SUPER_ADMIN_EMAIL is required}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:?SUPER_ADMIN_PASSWORD is required}
      AWS_REGION: ${AWS_REGION:?AWS_REGION is required}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL:?SES_FROM_EMAIL is required}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:?RUN_MIGRATIONS is required}
      SEED_ON_START: ${SEED_ON_START:?SEED_ON_START is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:?API_PORT is required}:4000"

  web:
    image: ${DOCKERHUB_NAMESPACE:?DOCKERHUB_NAMESPACE is required}/leadops-web:${WEB_IMAGE_TAG:?WEB_IMAGE_TAG is required}
    container_name: leadops-web-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:?WEB_PORT is required}:3000"

volumes:
  leadops-postgres-prod:
  leadops-redis-prod:
